<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Feedback</title>
    <link rel="stylesheet" href="feedback.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <a href="/index.html">
                    <img src="logo.jpg" alt="Electric Vehicle Guide">
                </a>
            </div>
            <nav>
                <ul>
                    <li><a href="/home.html">Home</a></li>
                    <li><a href="/about.html">About EVs</a></li>
                    <li><a href="/evmodels.html">EV Models</a></li>
                    <li><a href="/charging.html">Charging Guide</a></li>
                    <li><a href="/maintenance.html">Maintenance Tips</a></li>
                    <li><a href="/feedback.html">Feedback</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="introduction">
            <h1>User Feedback Form</h1>
        </section>
        <div class="feedback">
            <form id="feedbackForm" action="#" method="POST">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="feedback">Feedback:</label>
                    <textarea id="feedback" name="feedback" rows="5" required></textarea>
                </div>
                <button type="submit">Submit Feedback</button>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-left">
                <h3>Contact Us</h3>
                <p>Email: info@example.com</p>
                <p>Phone: 123-456-7890</p>
            </div>
            <div class="footer-right">
                <ul class="social-icons">
                    <li><a href="#" class="icon-facebook"></a></li>
                    <li><a href="#" class="icon-twitter"></a></li>
                    <li><a href="#" class="icon-instagram"></a></li>
                    <li><a href="#" class="icon-linkedin"></a></li>
                </ul>
            </div>
        </div>
        <div class="copyright">
            <p>&copy; 2024 Electric Vehicle Guide. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("feedbackForm").addEventListener("submit", function(event) {
                event.preventDefault();
                const formData = new FormData(this);
                fetch("https://bb60-27-107-1-6.ngrok-free.app/submit_feedback", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(Object.fromEntries(formData))
                })
                .then(response => response.json())
                .then(data => {
                    alert(data.message);
                    document.getElementById("feedbackForm").reset();
                })
                .catch(error => {
                    console.error("Error:", error);
                    alert("An error occurred while submitting feedback.");
                });
            });
        });
    </script>
</body>
</html>
